<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gahoi Bandhu - Icon</title>
<style>
/* Icon Template - 512x512px */
body {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
}

.icon-container {
  width: 512px;
  height: 512px;
  background: linear-gradient(135deg, #c8900a 0%, #e8a020 50%, #c8900a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Circular border */
.icon-container::before {
  content: '';
  position: absolute;
  width: 480px;
  height: 480px;
  border: 8px solid rgba(26,58,92,0.3);
  border-radius: 50%;
}

.icon-content {
  position: relative;
  z-index: 2;
  text-align: center;
}

/* Main Text */
.icon-text {
  font-size: 140px;
  font-weight: 900;
  color: #1a3a5c;
  text-shadow: 
    3px 3px 0 rgba(255,255,255,0.5),
    -1px -1px 0 rgba(0,0,0,0.1);
  line-height: 1;
  margin-bottom: 10px;
  letter-spacing: -5px;
}

.icon-subtext {
  font-size: 48px;
  font-weight: 700;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  background: rgba(26,58,92,0.8);
  padding: 8px 24px;
  border-radius: 30px;
  display: inline-block;
}

/* Decorative elements */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2);
}

.deco-circle.c1 {
  width: 100px;
  height: 100px;
  top: 50px;
  left: 50px;
}

.deco-circle.c2 {
  width: 80px;
  height: 80px;
  bottom: 60px;
  right: 60px;
}

.deco-circle.c3 {
  width: 60px;
  height: 60px;
  top: 80px;
  right: 80px;
}
</style>
</head>
<body>

<div class="icon-container">
  <!-- Decorative circles -->
  <div class="deco-circle c1"></div>
  <div class="deco-circle c2"></div>
  <div class="deco-circle c3"></div>

  <!-- Main Icon Content -->
  <div class="icon-content">
    <div class="icon-text">GB</div>
    <div class="icon-subtext">गहोई</div>
  </div>
</div>

</body>
</html>
